services:
  - type: web
    name: consultar-negocios
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      playwright install --with-deps chromium
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
